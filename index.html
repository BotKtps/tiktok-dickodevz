<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTT - TikTok Downloader</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ea;
            --accent: #ff0050;
            --bg: #050505;
            --card: #111111;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px; /* Padding luar diperkecil untuk mobile */
        }

        .container {
            width: 100%;
            max-width: 450px; /* Maksimal lebar untuk desktop */
            background: var(--card);
            padding: 30px 20px; /* Padding adaptif */
            border-radius: 25px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin: auto 0; /* Menjaga posisi di tengah layar */
        }

        .brand { margin-bottom: 25px; }
        .brand h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
        .brand span { display: block; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; font-weight: 600; }

        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            outline: none; 
            font-size: 14px; 
            margin-bottom: 15px; 
            transition: 0.3s;
            -webkit-appearance: none; /* Menghilangkan shadow iOS */
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 234, 0.2); }

        .btn-fetch { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            background: #fff; 
            color: #000; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.9rem;
        }
        .btn-fetch:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-fetch:active { transform: scale(0.98); }

        /* Hasil Pencarian */
        #result { display: none; margin-top: 25px; animation: slideUp 0.4s ease; width: 100%; }
        
        .video-wrapper { 
            width: 100%; 
            max-width: 280px; /* Batasi lebar preview agar tidak kepanjangan */
            margin: 0 auto 20px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333; 
            background: #000;
        }
        video { width: 100%; display: block; background: #000; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-dl { 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.8rem;
            transition: 0.2s; 
        }
        .mp4 { background: var(--accent); color: white; }
        .mp3 { background: #252525; color: white; }

        /* Media Queries untuk Layar Sangat Kecil (Layar HP < 350px) */
        @media (max-width: 350px) {
            .container { padding: 20px 15px; }
            .brand h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; } /* Tombol jadi tumpuk */
        }

        /* FAQ & Stats (Sama dengan sebelumnya, tapi font-size dipastikan pas) */
        .section-title { font-size: 0.75rem; color: var(--primary); margin: 25px 0 10px; text-transform: uppercase; font-weight: 700; text-align: left; border-left: 3px solid var(--accent); padding-left: 10px; }
        details { background: #0a0a0a; border-radius: 10px; margin-bottom: 8px; text-align: left; border: 1px solid #1a1a1a; }
        summary { padding: 10px; font-size: 0.75rem; font-weight: 600; cursor: pointer; list-style: none; }
        details p { padding: 0 10px 10px; font-size: 0.7rem; color: var(--text-muted); }

        .stats-footer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #222;
        }
        .stat-label { font-size: 0.55rem; color: var(--text-muted); }
        .stat-value { font-size: 0.7rem; font-weight: 800; }

        .loader { display: none; width: 20px; height: 20px; border: 3px solid #222; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { font-size: 0.65rem; color: #444; margin: 20px 0; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <h1>SNAPTT</h1>
            <span>TikTok Downloader</span>
        </div>

        <input type="text" id="url" placeholder="Tempel link video TikTok..." inputmode="url">
        <button id="btn" class="btn-fetch" onclick="handleFetch()">DAPATKAN VIDEO</button>
        
        <div class="loader" id="loading"></div>

        <div id="result">
            <div class="video-wrapper">
                <video id="player" controls playsinline poster=""></video>
            </div>
            <div class="grid">
                <button onclick="handleDownload('video')" class="btn-dl mp4">SIMPAN MP4</button>
                <button onclick="handleDownload('audio')" class="btn-dl mp3">SIMPAN MP3</button>
            </div>
            <p id="msg" style="font-size: 9px; color: #555; margin-top: 10px;"></p>
        </div>

        <h3 class="section-title">INFO LAYANAN</h3>
        <details>
            <summary>Cara Penggunaan?</summary>
            <p>Klik 'Share' di TikTok, pilih 'Copy Link', lalu tempelkan di sini.</p>
        </details>
        <details>
            <summary>Kualitas Video?</summary>
            <p>Video akan diunduh dengan kualitas terbaik (HD) tanpa watermark.</p>
        </details>

        <div class="stats-footer">
            <div class="stat-box">
                <div style="width:5px; height:5px; background:#0f0; border-radius:50%; margin:0 auto 3px; box-shadow: 0 0 5px #0f0;"></div>
                <span class="stat-label">STATUS</span>
                <span class="stat-value">STABIL</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">ENGINE</span>
                <span class="stat-value">v2.0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">USERS</span>
                <span class="stat-value">1.4k+</span>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 DICKODEVZ - SNAPTT</footer>

    <script src="api.js"></script>
    <script>
        // Logika script sama dengan sebelumnya
        let sessionData = null;

        async function handleFetch() {
            const input = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            const player = document.getElementById('player');

            if(!input) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            btn.disabled = true;

            try {
                const data = await fetchTikTok(input);
                if(data.status) {
                    sessionData = data.result;
                    player.src = sessionData.data;
                    player.poster = sessionData.cover;
                    document.getElementById('result').style.display = 'block';
                } else {
                    alert("Link tidak valid atau API sedang sibuk.");
                }
            } catch (e) {
                alert("Kesalahan koneksi ke server.");
            } finally {
                document.getElementById('loading').style.display = 'none';
                btn.disabled = false;
            }
        }

        async function handleDownload(type) {
            if(!sessionData) return;
            const msg = document.getElementById('msg');
            msg.innerText = "Memulai unduhan...";
            const url = type === 'video' ? sessionData.data : sessionData.music_info.url;
            const ext = type === 'video' ? 'mp4' : 'mp3';
            await triggerDownload(url, ext);
            setTimeout(() => { msg.innerText = ""; }, 3000);
        }
    </script>
</body>
</html>

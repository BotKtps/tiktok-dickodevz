<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICKODEVZ - Tiktok Downloader</title>
    <style>
        :root {
            --primary: #00f2ea;
            --accent: #ff0050;
            --bg: #050505;
            --card: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* Branding Section */
        .brand {
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .brand span {
            display: block; /* Membuat teks di bawahnya */
            font-size: 0.85rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 5px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn-fetch {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: #fff;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-fetch:hover { background: var(--primary); transform: translateY(-2px); }

        /* Loader */
        .loader {
            display: none;
            width: 25px;
            height: 25px;
            border: 3px solid #222;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        /* Result Area */
        #result {
            display: none;
            margin-top: 30px;
            animation: slideUp 0.4s ease;
        }

        .preview {
            width: 100%;
            border-radius: 20px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-dl {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .mp4 { background: var(--accent); color: white; }
        .mp3 { background: #252525; color: white; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <h1>DICKODEVZ</h1>
            <span>Tiktok Downloader</span>
        </div>

        <div class="input-group">
            <input type="text" id="url" placeholder="Masukkan link video...">
        </div>
        
        <button id="btn" class="btn-fetch" onclick="fetchData()">DAPATKAN VIDEO</button>
        
        <div class="loader" id="loading"></div>

        <div id="result">
            <img id="thumb" class="preview" src="">
            <div class="grid">
                <button onclick="download('video')" class="btn-dl mp4">MP4 VIDEO</button>
                <button onclick="download('audio')" class="btn-dl mp3">MP3 AUDIO</button>
            </div>
            <p id="msg" style="font-size: 10px; color: #555; margin-top: 15px;"></p>
        </div>
    </div>

    <script>
        let resData = null;

        async function fetchData() {
            const val = document.getElementById('url').value;
            if(!val) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('btn').disabled = true;

            try {
                const response = await fetch(`https://api.nexray.eu.cc/downloader/tiktok?url=${encodeURIComponent(val)}`);
                const json = await response.json();

                if(json.status) {
                    resData = json.result;
                    document.getElementById('thumb').src = resData.cover;
                    document.getElementById('result').style.display = 'block';
                }
            } catch (e) {
                alert("Gagal mengambil data");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btn').disabled = false;
            }
        }

        async function download(type) {
            const url = type === 'video' ? resData.data : resData.music_info.url;
            const ext = type === 'video' ? 'mp4' : 'mp3';
            const msg = document.getElementById('msg');
            
            msg.innerText = "Mengunduh file...";

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `dickodevz_${Date.now()}.${ext}`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                    msg.innerText = "Selesai!";
                }, 100);
            } catch (e) {
                window.location.assign(url);
            }
        }
    </script>
</body>
</html>
